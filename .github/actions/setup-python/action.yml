# .github/actions/setup-project/action.yml
name: 'Setup Python'
description: 'Sets up Python and installs dependencies'
runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install Python dependencies
      run: |
        pip install pytest pyodbc