name: CI/CD for Jetproger.Studio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Setup .NET 9.x
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.x'
    - name: Install dependencies
      run: dotnet restore .\Jetproger.Kit.Transformings\Jetproger.Kit.Transformings.sln
    - name: Build
      run: dotnet build --no-restore .\Jetproger.Kit.Transformings\Jetproger.Kit.Transformings.sln
        
    - name: Run tests
      run: echo "Hello, GitHub Actions!"