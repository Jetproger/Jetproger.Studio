name: CI/CD for Jetproger.Studio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - uses: .\.github\actions\setup-python

    - name: Setup .NET 9.x
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.x'
    - name: Install dependencies
      run: dotnet restore .\Jetproger.Kit.Transformings\Jetproger.Kit.Transformings.sln
    - name: Build
      run: dotnet build --no-restore .\Jetproger.Kit.Transformings\Jetproger.Kit.Transformings.sln

    - name: Setup MS SQL Server
      uses: Particular/install-sql-server-action@v1.4.0
      with:
        catalog: JetprogerStudio
        connection-string-env-var: SQL_CONNECTION_STRING
        collation: SQL_Latin1_General_CP1_CS_AS
        extra-params: ;TrustServerCertificate=yes;Trusted_Connection=yes;
        
    - name: Run tests
      run: echo "Hello, GitHub Actions!"